spring.application.name=golf-charity

# ================== DATABASE ==================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000

# ================== JPA ==================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ================== SERVER ==================
server.port=${PORT:10000}

# ================== ERROR DEBUG ==================
server.error.include-message=always
server.error.include-binding-errors=always

# ================== JWT ==================
jwt.secret=${JWT_SECRET:golf-charity-super-secret-jwt-key-32chars!!}
jwt.expiration=86400000

# ================== STRIPE ==================
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.price.monthly=${STRIPE_PRICE_MONTHLY:price_placeholder_monthly}
stripe.price.yearly=${STRIPE_PRICE_YEARLY:price_placeholder_yearly}

# ================== FILE UPLOAD ==================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================== CORS ==================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ================== EMAIL ==================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@golfcharity.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.enabled=${MAIL_ENABLED:false}
mail.from=${MAIL_FROM:noreply@golfcharity.com}

# ================== FRONTEND ==================
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ================== CLOUDINARY ==================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
