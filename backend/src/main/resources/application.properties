spring.application.name=golf-charity

# Database — replace with your Supabase connection string
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/golf_charity}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:Poojitha09}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# JPA — use update so tables are created/updated automatically in dev
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=true

# JWT
jwt.secret=${JWT_SECRET:golf-charity-super-secret-jwt-key-32chars!!}
jwt.expiration=86400000

# Stripe — mock values work fine for local dev
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.price.monthly=${STRIPE_PRICE_MONTHLY:price_placeholder_monthly}
stripe.price.yearly=${STRIPE_PRICE_YEARLY:price_placeholder_yearly}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176}

# Server
server.port=${PORT:8080}

# Show full error messages in dev
server.error.include-message=always
server.error.include-binding-errors=always

# Email (configure with real SMTP for production)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@golfcharity.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.enabled=${MAIL_ENABLED:false}
mail.from=${MAIL_FROM:noreply@golfcharity.com}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Cloudinary (for file uploads)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
